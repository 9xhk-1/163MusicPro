name: Build & Release APK

on:
  push:
    branches: ['main']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            if echo "$KEYSTORE_BASE64" | base64 -di > release.keystore 2>/dev/null && [ -s release.keystore ]; then
              echo "Keystore decoded successfully ($(wc -c < release.keystore) bytes)"
            else
              echo "::warning::Keystore decode failed, will build debug APK"
              rm -f release.keystore
            fi
          else
            echo "No KEYSTORE_BASE64 secret configured, will build debug APK"
          fi

      - name: Build signed release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -f release.keystore ]; then
            echo "Building signed release APK..."
            ./gradlew assembleRelease
          else
            echo "No signing config found, building debug APK"
            ./gradlew assembleDebug
          fi

      - name: Get version info
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle | sed 's/.*"\(.*\)".*/\1/')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle | sed 's/[^0-9]//g')
          echo "name=v${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION_NAME}-build${VERSION_CODE}" >> $GITHUB_OUTPUT

      - name: Find APK
        id: apk
        run: |
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            echo "path=app/build/outputs/apk/release/app-release.apk" >> $GITHUB_OUTPUT
            echo "name=163MusicPro-${{ steps.version.outputs.name }}.apk" >> $GITHUB_OUTPUT
          else
            echo "path=app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_OUTPUT
            echo "name=163MusicPro-${{ steps.version.outputs.name }}-debug.apk" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "163MusicPro ${{ steps.version.outputs.name }}"
          body: |
            ## 163MusicPro ${{ steps.version.outputs.name }}
          files: ${{ steps.apk.outputs.path }}
          draft: false
          prerelease: false
      - name: Upload APK to Gitee via REST API and Update source.json
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
          APK_PATH: ${{ steps.apk.outputs.path }}
        run: |
          echo "=== Step 1: Upload APK to Gitee via REST API ==="

          python - <<'PY'
          import base64
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request

          apk_path = os.environ["APK_PATH"]
          tag_name = os.environ["TAG_NAME"]
          token = os.environ["GITEE_TOKEN"]
          url = f"https://gitee.com/api/v5/repos/xtcqinghe/163-music-pro/contents/{tag_name}.apk"
          apk_size = os.path.getsize(apk_path)

          print(json.dumps({"path": f"{tag_name}.apk", "size_bytes": apk_size}, ensure_ascii=False))

          with open(apk_path, "rb") as apk_file:
              content = base64.b64encode(apk_file.read()).decode("ascii")

          payload = urllib.parse.urlencode(
              {
                  "access_token": token,
                  "content": content,
                  "message": f"Auto sync APK: {tag_name} from GitHub Actions",
              }
          ).encode("utf-8")

          request = urllib.request.Request(url, data=payload, method="POST")
          request.add_header("Content-Type", "application/x-www-form-urlencoded")
          try:
              with urllib.request.urlopen(request) as response:
                  result = json.loads(response.read().decode("utf-8"))
                  print(json.dumps(result, ensure_ascii=False))
          except urllib.error.HTTPError as error:
              body = error.read().decode("utf-8", errors="replace")
              print(body)
              raise
          PY

          # 配置 Git 用户信息
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          echo "=== Step 2: Update source.json in current GitHub Repo ==="

          # 创建/更新 source.json
          # 注意：URL 中不能有空格，已修正你描述中的空格问题
          echo "[\"https://gitee.com/xtcqinghe/163-music-pro/raw/master/${TAG_NAME}.apk\"]" > source.json
          
          # 提交并推送到当前 GitHub 仓库 (main 分支)
          git add source.json
          git commit -m "chore: update source.json for ${TAG_NAME}"
          
          # 推送回 GitHub
          # 使用 github.token 自动认证，无需额外配置 Secret
          git push origin main
