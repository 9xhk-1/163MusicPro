name: Build & Release APK

on:
  push:
    branches: ['main']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            if echo "$KEYSTORE_BASE64" | base64 -di > release.keystore 2>/dev/null && [ -s release.keystore ]; then
              echo "Keystore decoded successfully ($(wc -c < release.keystore) bytes)"
            else
              echo "::warning::Keystore decode failed, will build debug APK"
              rm -f release.keystore
            fi
          else
            echo "No KEYSTORE_BASE64 secret configured, will build debug APK"
          fi

      - name: Build signed release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -f release.keystore ]; then
            echo "Building signed release APK..."
            ./gradlew assembleRelease
          else
            echo "No signing config found, building debug APK"
            ./gradlew assembleDebug
          fi

      - name: Get version info
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle | sed 's/.*"\(.*\)".*/\1/')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle | sed 's/[^0-9]//g')
          echo "name=v${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION_NAME}-build${VERSION_CODE}" >> $GITHUB_OUTPUT

      - name: Find APK
        id: apk
        run: |
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            echo "path=app/build/outputs/apk/release/app-release.apk" >> $GITHUB_OUTPUT
            echo "name=163MusicPro-${{ steps.version.outputs.name }}.apk" >> $GITHUB_OUTPUT
          else
            echo "path=app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_OUTPUT
            echo "name=163MusicPro-${{ steps.version.outputs.name }}-debug.apk" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "163MusicPro ${{ steps.version.outputs.name }}"
          body: |
            ## 163MusicPro ${{ steps.version.outputs.name }}
          files: ${{ steps.apk.outputs.path }}
          draft: false
          prerelease: false
      - name: Sync APK to Gitee and Update source.json
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
          APK_PATH: ${{ steps.apk.outputs.path }}
          APK_NAME: ${{ steps.apk.outputs.name }}
        run: |
          echo "=== Step 1: Push APK to Gitee ==="
          
          # 配置 Git 用户信息
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          # 克隆 Gitee 仓库 (使用 shallow clone 加快速度)
          # 注意：xtcqinghe/163-music-pro 需要替换为你实际的 Gitee 用户名/仓库名，如果就是这个名字则无需修改
          GITEE_REPO_URL="https://oauth2:${GITEE_TOKEN}@gitee.com/xtcqinghe/163-music-pro.git"
          git clone --depth 1 --branch master $GITEE_REPO_URL gitee_repo
          
          # 进入 Gitee 仓库目录
          cd gitee_repo
          
          # 复制 APK 并重命名为 {tag}.apk
          # 注意：APK_PATH 是相对路径，需要从项目根目录引用
          cp ../$APK_PATH "./${TAG_NAME}.apk"
          
          # 提交到 Gitee
          git add "${TAG_NAME}.apk"
          git commit -m "Auto sync APK: ${TAG_NAME} from GitHub Actions"
          git push origin master
          
          echo "=== Step 2: Update source.json in current GitHub Repo ==="
          
          # 回到 GitHub 工作目录
          cd ..
          
          # 创建/更新 source.json
          # 注意：URL 中不能有空格，已修正你描述中的空格问题
          echo "[\"https://gitee.com/xtcqinghe/163-music-pro/raw/master/${TAG_NAME}.apk\"]" > source.json
          
          # 提交并推送到当前 GitHub 仓库 (main 分支)
          git add source.json
          git commit -m "chore: update source.json for ${TAG_NAME}"
          
          # 推送回 GitHub
          # 使用 github.token 自动认证，无需额外配置 Secret
          git push origin main